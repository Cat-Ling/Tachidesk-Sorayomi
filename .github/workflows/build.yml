name: Build

on: push

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
            build_path: build/app/outputs/flutter-apk
          - os: macos-latest
            target: ios
            build_path: build/ios
          - os: ubuntu-latest
            target: web
            build_path: build/web
          - os: ubuntu-latest
            target: linux
            build_path: build/linux/x64/release/bundle
          - os: macos-latest
            target: macos
            build_path: build/macos/Build/Products/Release
          - os: windows-latest
            target: windows
            build_path: build\windows\x64\runner\Release

    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev

      - name: Install Android dependencies
        if: matrix.target == 'android'
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17.x"

      - name: Enable desktop support
        if: matrix.target != 'android' && matrix.target != 'ios' && matrix.target != 'web'
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-windows-desktop

      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build --delete-conflicting-outputs

      # Android Build
      - if: matrix.target == 'android'
        run: |
          flutter build apk --release
          flutter build apk --split-per-abi --release

      # iOS Build (Unsigned)
      - if: matrix.target == 'ios'
        run: flutter build ios --release --no-codesign

      # Other Builds
      - if: matrix.target != 'android' && matrix.target != 'ios'
        run: flutter build ${{ matrix.target }} --release

      # Packaging output files
      - name: Package Android
        if: matrix.target == 'android'
        working-directory: ${{ matrix.build_path }}
        run: |
          mv app-release.apk "$GITHUB_WORKSPACE/Tachidesk-Sorayomi-android-all.apk"
          mv app-arm64-v8a-release.apk "$GITHUB_WORKSPACE/Tachidesk-Sorayomi-android-arm64-v8a.apk"
          mv app-armeabi-v7a-release.apk "$GITHUB_WORKSPACE/Tachidesk-Sorayomi-android-armeabi-v7a.apk"
          mv app-x86_64-release.apk "$GITHUB_WORKSPACE/Tachidesk-Sorayomi-android-x86_64.apk"

      - name: Package iOS
        if: matrix.target == 'ios'
        working-directory: ${{ matrix.build_path }}
        run: |
          cd iphoneos
          mkdir Payload
          # Unsigned app bundle needs to be zipped
          ln -s ../Runner.app
          cd ..
          zip -r app-release.ipa Payload
          mv app-release.ipa "$GITHUB_WORKSPACE/Tachidesk-Sorayomi-ios.ipa"

      - name: Package Web
        if: matrix.target == 'web'
        working-directory: ${{ matrix.build_path }}
        run: zip -r "$GITHUB_WORKSPACE/Tachidesk-Sorayomi-web.zip" *

      - name: Package Linux
        if: matrix.target == 'linux'
        working-directory: ${{ matrix.build_path }}
        run: GZIP=-9 tar czf "$GITHUB_WORKSPACE/Tachidesk-Sorayomi-linux-x64.tar.gz" *

      - name: Package macOS
        if: matrix.target == 'macos'
        working-directory: ${{ matrix.build_path }}
        run: ditto -c -k --sequesterRsrc --keepParent "Sorayomi.app" "$GITHUB_WORKSPACE/Tachidesk-Sorayomi-macos-x64.zip"

      - name: Package Windows
        if: matrix.target == 'windows'
        working-directory: ${{ matrix.build_path }}
        run: compress-archive -Path * -DestinationPath "${env:GITHUB_WORKSPACE}\Tachidesk-Sorayomi-windows-x64.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          prerelease: false
          files: Tachidesk-Sorayomi-*
